# Configuração exclusiva dos TESTES — sobrepõe-se ao application.properties de produção
# (que exige MYSQL_URL). Os testes correm em H2 em memória (modo MySQL), com o Flyway a migrar.
spring.datasource.url=jdbc:h2:mem:klientt-test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 (não o MySQLDialect de produção) + validate (o schema vem do Flyway).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Email desligado nos testes → o link de confirmação vai só para o log (sem Resend).
klientt.email.enabled=false
