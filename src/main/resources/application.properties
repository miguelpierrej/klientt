spring.application.name=klientt

# --- Servidor ---
# Railway injeta a porta em $PORT.
server.port=${PORT:8080}

# --- Base de dados ---
spring.datasource.url=${MYSQL_URL}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hikari ---
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:240000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:90000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME_MS:30000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:2000}
spring.datasource.hikari.connection-test-query=${DB_POOL_TEST_QUERY:SELECT 1}

# --- JPA / Hibernate ---
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Lista de resultados: leads por página (paginação server-side).
# É também a 1ª página GRÁTIS: a busca inicial traz exatamente uma página e não consome créditos;
# só "carregar mais" consome. Fonte única de verdade do "grátis". ---
klientt.busca.tamanho-pagina=${BUSCA_TAMANHO_PAGINA:20}

# --- Flyway (migrações) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Descoberta: Casa dos Dados (https://api.casadosdados.com.br) — ligada em dev ---
klientt.cnpj.enabled=${CNPJ_ENABLED:true}
klientt.cnpj.base-url=${CNPJ_BASE_URL:https://api.casadosdados.com.br}
klientt.cnpj.api-key=${CNPJ_API_KEY:569a7e1de7a5c7df47b8b6eab4342ff755b4d01dd5d4ac828b37faf83094d9f1ce336c991e784dc4680eff869723f72a4d94858c2a11aaa3e1a5d191df224dd0}
# Lote de cada "carregar mais" (a 1ª página grátis é regida por klientt.busca.tamanho-pagina).
klientt.cnpj.limite-default=${CNPJ_LIMITE:20}

# --- Fonte de descoberta por CNAE: minhareceita (grátis, default) | casadosdados (pago).
# A busca por NOME vai sempre para a Casa dos Dados (ver 'Nova integração.md'). ---
klientt.descoberta.fonte=${DESCOBERTA_FONTE:minhareceita}
# Fallback: só quando a Minha Receita (grátis) FALHA (fora do ar/erro), tenta a Casa dos Dados (paga)
# na 1ª página. "Sem resultados" não aciona o fallback (não gasta crédito à toa).
klientt.descoberta.fallback-casadosdados=${DESCOBERTA_FALLBACK:true}
klientt.minha-receita.enabled=${MINHA_RECEITA_ENABLED:true}
klientt.minha-receita.base-url=${MINHA_RECEITA_BASE_URL:https://minhareceita.org}

# --- Resolução nicho->CNAE: catálogo IBGE + Gemini no fallback.
# Sem chave (cnae.enabled=false), só o catálogo determinístico resolve. ---
klientt.cnae.enabled=${CNAE_LLM_ENABLED:true}
klientt.cnae.api-key=${GEMINI_API_KEY:}
# gemini-flash-latest = alias flutuante do flash atual (evita modelos "gated"/descontinuados).
klientt.cnae.model=${CNAE_MODEL:gemini-flash-latest}

# --- Enriquecimento de contacto por CNPJ (Nova integração) — desligado por default.
# Gate MESTRE: quando ligado, empresas sem telefone/email são enriquecidas pela cadeia
# CNPJá open (primário) → BrasilAPI (fallback). ---
klientt.contato-fallback.enabled=${CONTATO_FALLBACK_ENABLED:true}
klientt.contato-fallback.base-url=${CONTATO_FALLBACK_BASE_URL:https://brasilapi.com.br}
# CNPJá open (primário da cadeia) — limite público 5 req/min por IP.
klientt.contato-cnpja.enabled=${CONTATO_CNPJA_ENABLED:true}
klientt.contato-cnpja.base-url=${CONTATO_CNPJA_BASE_URL:https://open.cnpja.com}
klientt.contato-cnpja.req-por-minuto=${CONTATO_CNPJA_RPM:5}

# --- Stripe (compra de créditos de leads, pagamento único) — desligado sem chave.
# Recomendado: chave RESTRITA (rk_). Sem chave, /creditos mostra "indisponível". ---
klientt.stripe.secret-key=${STRIPE_SECRET_KEY:}
klientt.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
klientt.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
klientt.stripe.price-id=${STRIPE_PRICE_ID:}
klientt.stripe.leads-por-pacote=${STRIPE_LEADS_PACOTE:3000}

# --- Procon "Evite Sites" — desligado por default.
# Quando ligado, sincroniza a lista oficial no cron definido. ---
klientt.procon.enabled=${PROCON_ENABLED:false}
klientt.procon.url=${PROCON_URL:https://sistemas.procon.sp.gov.br/evitesite/list/evitesites.php}
klientt.procon.cron=${PROCON_CRON:0 0 4 * * *}

# --- Email (Resend) — confirmação de conta em dois passos.
# Ligado (enabled=true) requer RESEND_API_KEY + remetente de um domínio verificado no Resend.
# Desligado: os emails NÃO são enviados; o link de confirmação vai só para o log. ---
klientt.email.enabled=${EMAIL_ENABLED:true}
klientt.email.api-key=${RESEND_API_KEY:}
klientt.email.from=${EMAIL_FROM:Klientt <no-reply@klientt.com.br>}
klientt.email.base-url=${RESEND_BASE_URL:https://api.resend.com}

# --- Rate limiting (anti-abuso) — limita por IP: login/registo, e-mails e busca. Excedido → 429.
# Atrás de proxy (Railway) o IP vem do X-Forwarded-For. Estado em memória (instância única). ---
klientt.ratelimit.enabled=${RATELIMIT_ENABLED:true}
