spring.application.name=klientt

# --- Servidor ---
# Railway injeta a porta em $PORT.
server.port=${PORT:8080}

# --- Base de dados ---
# Default: H2 em memória (dev/local). Em produção (Railway), definir por variável de ambiente
# SPRING_DATASOURCE_URL/USERNAME/PASSWORD (MySQL) — sobrepõem-se a estes valores.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:klientt;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Consola H2 só em dev (ver application-dev.properties).
spring.h2.console.enabled=false

# --- Lista de resultados: leads por página (paginação server-side).
# É também a 1ª página GRÁTIS: a busca inicial traz exatamente uma página e não consome créditos;
# só "carregar mais" consome. Fonte única de verdade do "grátis". ---
klientt.busca.tamanho-pagina=${BUSCA_TAMANHO_PAGINA:20}

# --- JPA / Hibernate ---
# O esquema é gerido pelo Flyway; Hibernate apenas valida (nunca altera a BD).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway (migrações) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Descoberta: Casa dos Dados (CNPJ por CNAE/nome) — desligada por default ---
# Quando ligada, busca empresas ativas por CNAE/nome numa API gerida de CNPJ.
klientt.cnpj.enabled=${CNPJ_ENABLED:false}
klientt.cnpj.base-url=${CNPJ_BASE_URL:}
klientt.cnpj.api-key=${CNPJ_API_KEY:}
# Tamanho do lote de cada "carregar mais" (NÃO afeta a 1ª página grátis, regida por tamanho-pagina).
klientt.cnpj.limite-default=${CNPJ_LIMITE:25}

# --- Fonte de descoberta por CNAE: minhareceita (grátis, default) | casadosdados (pago).
# A busca por NOME vai sempre para a Casa dos Dados (ver 'Nova integração.md'). ---
klientt.descoberta.fonte=${DESCOBERTA_FONTE:minhareceita}
klientt.minha-receita.enabled=${MINHA_RECEITA_ENABLED:true}
klientt.minha-receita.base-url=${MINHA_RECEITA_BASE_URL:https://minhareceita.org}

# --- Resolução nicho->CNAE: catálogo IBGE + Gemini no fallback.
# Sem chave (cnae.enabled=false), só o catálogo determinístico resolve. ---
klientt.cnae.enabled=${CNAE_LLM_ENABLED:false}
klientt.cnae.api-key=${GEMINI_API_KEY:}
klientt.cnae.model=${CNAE_MODEL:gemini-2.5-flash}

# --- Enriquecimento de contacto por CNPJ (Nova integração) — desligado por default.
# Gate MESTRE: quando ligado, empresas sem telefone/email são enriquecidas pela cadeia
# CNPJá open (primário) → BrasilAPI (fallback). ---
klientt.contato-fallback.enabled=${CONTATO_FALLBACK_ENABLED:false}
klientt.contato-fallback.base-url=${CONTATO_FALLBACK_BASE_URL:https://brasilapi.com.br}
# CNPJá open (primário da cadeia) — limite público 5 req/min por IP.
klientt.contato-cnpja.enabled=${CONTATO_CNPJA_ENABLED:true}
klientt.contato-cnpja.base-url=${CONTATO_CNPJA_BASE_URL:https://open.cnpja.com}
klientt.contato-cnpja.req-por-minuto=${CONTATO_CNPJA_RPM:5}

# --- Stripe (compra de créditos de leads, pagamento único) — desligado sem chave.
# Recomendado: chave RESTRITA (rk_). Sem chave, /creditos mostra "indisponível". ---
klientt.stripe.secret-key=${STRIPE_SECRET_KEY:}
klientt.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
klientt.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
klientt.stripe.price-id=${STRIPE_PRICE_ID:}
klientt.stripe.leads-por-pacote=${STRIPE_LEADS_PACOTE:3000}

# --- Procon "Evite Sites" — desligado por default.
# Quando ligado, sincroniza a lista oficial no cron definido. ---
klientt.procon.enabled=${PROCON_ENABLED:false}
klientt.procon.url=${PROCON_URL:https://sistemas.procon.sp.gov.br/evitesite/list/evitesites.php}
klientt.procon.cron=${PROCON_CRON:0 0 4 * * *}
