spring.application.name=klientt

# --- Base de dados: H2 em memória (DEV — "por hora") ---
# MODE=MySQL deixa o H2 aceitar sintaxe próxima do MySQL (facilita a troca futura).
spring.datasource.url=jdbc:h2:mem:klientt;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Base de dados: MySQL (para reativar mais tarde) ---
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:klientt}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=${DB_USER:klientt}
# spring.datasource.password=${DB_PASSWORD:klientt}

# --- JPA / Hibernate ---
# O esquema é gerido pelo Flyway; Hibernate apenas valida (nunca altera a BD).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway (migrações) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Serviço de scraping (ver docs/CONTRATO-SCRAPER.md) ---
klientt.scraper.base-url=${SCRAPER_BASE_URL:http://localhost:8000}
klientt.scraper.token=${SCRAPER_TOKEN:dev-secret}
# stub=true permite usar o scraper simulado interno em testes locais isolados.
klientt.scraper.stub=${SCRAPER_STUB:false}
klientt.scraper.public-base-url=${KLIENTT_PUBLIC_URL:http://localhost:8080}
klientt.scraper.callback-path=/api/scraper/callbacks
# Enriquecimento Maps por empresa (Fase 2): endpoint no scraper + webhook de retorno no Klientt.
klientt.scraper.enriquecimento-path=/v1/enrich
klientt.scraper.enriquecimento-callback-path=/api/scraper/enriquecimento
klientt.scraper.limite-default=50
klientt.scraper.tamanho-lote=15
klientt.scraper.coletar-emails=true
# Verificação SMTP por permutação (contato@, vendas@…) — agressiva, exige porta 25; desligada.
klientt.scraper.verificar-smtp=${SCRAPER_VERIFICAR_SMTP:false}

# --- Fonte CNPJ por CNAE (PLANO-DUAL-FONTE.md, Fase D) — desligada por default.
# Quando ligada, busca empresas ativas por CNAE+município numa API gerida (CNPJá/Casa dos Dados). ---
klientt.cnpj.enabled=${CNPJ_ENABLED:false}
klientt.cnpj.base-url=${CNPJ_BASE_URL:}
klientt.cnpj.api-key=${CNPJ_API_KEY:}
# Limite por busca da fonte CNPJ — mais baixo que o scraper para controlar saldo do fornecedor.
klientt.cnpj.limite-default=25

# --- Resolução nicho->CNAE: tabela determinística + Claude no fallback.
# Sem chave (cnae.enabled=false), só a tabela determinística resolve. ---
klientt.cnae.enabled=${CNAE_LLM_ENABLED:false}
klientt.cnae.api-key=${ANTHROPIC_API_KEY:}
klientt.cnae.model=${CNAE_MODEL:claude-opus-4-8}

# --- Procon "Evite Sites" — desligado por default (ARQUITETURA §2.4).
# Quando ligado, sincroniza a lista oficial no cron definido e pontua por domínio. ---
klientt.procon.enabled=${PROCON_ENABLED:false}
klientt.procon.url=${PROCON_URL:https://sistemas.procon.sp.gov.br/evitesite/list/evitesites.php}
klientt.procon.cron=${PROCON_CRON:0 0 4 * * *}

# --- Stripe (pagamentos) — vazio no perfil base = modo desligado.
# As chaves de TESTE estão em application-dev.properties (perfil 'dev', fora do git). ---
klientt.stripe.secret-key=${STRIPE_SECRET_KEY:}
klientt.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
klientt.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
klientt.stripe.currency=brl

# Price IDs Stripe por plano (preencher quando houver chaves):
klientt.stripe.prices.Starter=${STRIPE_PRICE_STARTER:}
klientt.stripe.prices.Pro=${STRIPE_PRICE_PRO:}
klientt.stripe.prices.Agency=${STRIPE_PRICE_AGENCY:}
