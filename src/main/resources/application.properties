spring.application.name=klientt

# --- Base de dados: H2 em memória (DEV — "por hora") ---
# MODE=MySQL deixa o H2 aceitar sintaxe próxima do MySQL (facilita a troca futura).
spring.datasource.url=jdbc:h2:mem:klientt;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Base de dados: MySQL (para reativar mais tarde) ---
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:klientt}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=${DB_USER:klientt}
# spring.datasource.password=${DB_PASSWORD:klientt}

# --- JPA / Hibernate ---
# O esquema é gerido pelo Flyway; Hibernate apenas valida (nunca altera a BD).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway (migrações) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Serviço de scraping (ver docs/CONTRATO-SCRAPER.md) ---
klientt.scraper.base-url=${SCRAPER_BASE_URL:http://localhost:8000}
klientt.scraper.token=${SCRAPER_TOKEN:dev-secret}
# stub=true usa o scraper simulado interno; pôr false quando o scraper real existir.
klientt.scraper.stub=${SCRAPER_STUB:true}
klientt.scraper.public-base-url=${KLIENTT_PUBLIC_URL:http://localhost:8080}
klientt.scraper.callback-path=/api/scraper/callbacks
klientt.scraper.limite-default=50
