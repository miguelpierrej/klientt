<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — pagamento recebido</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">Pagamento recebido</p>
        </div>
    </div>
</header>

<main class="container conta">
    <div class="cartao-conta">
        <h2><svg th:replace="~{fragments/icones :: sucesso}"></svg> Obrigado!</h2>
        <p th:if="${creditados > 0}">
            Pagamento confirmado — <strong th:text="${creditados}">3000</strong> leads adicionados ao teu saldo.
        </p>
        <p th:unless="${creditados > 0}">
            O teu pagamento foi recebido. Se o saldo abaixo ainda não refletir a compra,
            atualiza esta página dentro de instantes.
        </p>
        <p>Saldo disponível: <strong th:text="${saldo}">0</strong> leads.</p>
        <p>
            <a class="btn" th:href="@{/app}">Voltar às buscas</a>
            <a class="btn-link" th:href="@{/conta}">Ver o meu saldo</a>
        </p>
    </div>
</main>
</body>
</html>
