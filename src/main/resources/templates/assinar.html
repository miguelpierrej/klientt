<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — assinar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:if="${clientSecret}" src="https://js.stripe.com/v3/"></script>
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">Assinar <span th:text="${plano}">Plano</span></p>
        </div>
        <div class="utilizador">
            <a class="btn-link" th:href="@{/planos}">Voltar aos planos</a>
        </div>
    </div>
</header>

<main class="container conta">
    <h2>Assinar plano <span th:text="${plano}">Plano</span></h2>

    <p class="aviso erro" th:unless="${disponivel}">Pagamentos ainda não estão configurados.</p>
    <p class="aviso erro" th:if="${erro}" th:text="${erro}">erro</p>

    <form th:if="${clientSecret}" id="payment-form" class="form-conta">
        <div id="payment-element"><!-- Stripe Payment Element --></div>
        <button id="submit" type="submit" class="btn">Pagar e assinar</button>
        <p id="payment-message" class="aviso erro" style="display:none"></p>
    </form>
</main>

<script th:if="${clientSecret}" th:inline="javascript">
    const stripe = Stripe([[${publishableKey}]]);
    const clientSecret = [[${clientSecret}]];
    const sucessoUrl = [[${sucessoUrl}]];

    const elements = stripe.elements({ clientSecret });
    const paymentElement = elements.create("payment");
    paymentElement.mount("#payment-element");

    const form = document.getElementById("payment-form");
    const msg = document.getElementById("payment-message");
    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("submit").disabled = true;
        const { error } = await stripe.confirmPayment({
            elements,
            confirmParams: { return_url: sucessoUrl }
        });
        if (error) {
            msg.textContent = error.message;
            msg.style.display = "block";
            document.getElementById("submit").disabled = false;
        }
    });
</script>
</body>
</html>
