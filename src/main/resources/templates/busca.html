<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — encontre clientes que precisam de si</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <script>
        // Exporta os leads com os filtros/ordenação atualmente selecionados.
        function exportarLeads(jobId) {
            const form = document.querySelector('.filtros');
            const params = form ? new URLSearchParams(new FormData(form)).toString() : '';
            window.location = '/buscar/' + jobId + '/exportar' + (params ? '?' + params : '');
        }
    </script>
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">Encontre empresas que precisam do seu serviço — não apenas uma lista de telefones.</p>
        </div>
        <div class="utilizador">
            <span>Olá, <strong sec:authentication="principal.nome">usuário</strong></span>
            <a class="btn-link" th:href="@{/creditos}">Comprar leads</a>
            <a class="btn-link" th:href="@{/conta}">Minha conta</a>
            <form method="post" th:action="@{/logout}">
                <button type="submit" class="btn-link">Sair</button>
            </form>
        </div>
    </div>
</header>

<main class="container">
    <form class="busca-form"
          hx-post="/buscar"
          hx-target="#resultados"
          hx-swap="innerHTML"
          hx-indicator="#loading"
          hx-on::before-request="window.buscaInicio = Date.now()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="campo">
            <label for="tipo">Tipo de busca</label>
            <select id="tipo" name="tipo">
                <option value="NICHO">Por nicho</option>
                <option value="NOME">Por nome da empresa</option>
            </select>
        </div>
        <div class="campo cresce autocomplete">
            <label for="termo">O que procura?</label>
            <input type="text" id="termo" name="termo" autocomplete="off"
                   placeholder="ex.: barbearias, restaurantes, clínicas..."
                   hx-get="/sugestoes/cnae" hx-trigger="keyup changed delay:250ms"
                   hx-target="#sug-cnae" hx-swap="innerHTML"
                   oninput="document.getElementById('cnae').value=''" required>
            <input type="hidden" id="cnae" name="cnae">
            <div id="sug-cnae" class="sug-lista"></div>
        </div>
        <div class="campo autocomplete">
            <label for="regiao">Cidade / região</label>
            <input type="text" id="regiao" name="regiao" autocomplete="off" placeholder="ex.: Bauru"
                   hx-get="/sugestoes/cidade" hx-trigger="keyup changed delay:250ms"
                   hx-target="#sug-cidade" hx-swap="innerHTML">
            <div id="sug-cidade" class="sug-lista"></div>
        </div>
        <button type="submit" class="btn">Buscar</button>
    </form>

    <!-- Atalhos "buscar meus alvos" (do perfil): 1 clique preenche nicho+CNAE (+1ª região) e busca. -->
    <div id="atalhos" class="atalhos" th:if="${!#lists.isEmpty(atalhosNichos)}"
         th:attr="data-regiao=${#lists.isEmpty(atalhosRegioes)} ? '' : ${atalhosRegioes[0]}">
        <span class="atalhos-rotulo">Buscar meus alvos:</span>
        <button type="button" class="atalho-chip" th:each="n : ${atalhosNichos}"
                th:attr="data-cod=${n.codigo()},data-desc=${n.descricao()}"
                onclick="klienttBuscarAlvo(this)"
                th:text="${#strings.isEmpty(n.descricao())} ? ${n.codigoFormatado()} : ${n.descricao()}">nicho</button>
    </div>

    <div id="loading" class="loading htmx-indicator">Procurando empresas…</div>

    <section id="resultados" class="resultados">
        <p class="vazio">Faça uma busca para ver sua lista de empresas com contato.</p>
    </section>
</main>

<!-- Autocomplete: seleção fecha o dropdown e (no CNAE) fixa o código, pulando a confirmação. -->
<script th:inline="none">
    function klienttSelecionarCnae(el) {
        document.getElementById('termo').value = el.dataset.desc;
        document.getElementById('cnae').value = el.dataset.cod;
        document.getElementById('sug-cnae').innerHTML = '';
    }
    function klienttSelecionarCidade(el) {
        document.getElementById('regiao').value = el.dataset.nome + '/' + el.dataset.uf;
        document.getElementById('sug-cidade').innerHTML = '';
    }
    // Atalho "buscar meu alvo": preenche nicho+CNAE (+1ª região do perfil) e dispara a busca.
    function klienttBuscarAlvo(el) {
        document.getElementById('termo').value = el.dataset.desc || el.dataset.cod;
        document.getElementById('cnae').value = el.dataset.cod;
        var reg = document.getElementById('atalhos').getAttribute('data-regiao');
        if (reg) document.getElementById('regiao').value = reg;
        document.querySelector('.busca-form').requestSubmit();
    }
    // Fecha o dropdown ao sair do campo (delay para o clique na sugestão registar primeiro).
    [['termo', 'sug-cnae'], ['regiao', 'sug-cidade']].forEach(function (par) {
        var inp = document.getElementById(par[0]);
        if (inp) {
            inp.addEventListener('blur', function () {
                setTimeout(function () {
                    var s = document.getElementById(par[1]);
                    if (s) s.innerHTML = '';
                }, 150);
            });
        }
    });
</script>

<!-- Feedback imediato ao clicar num lead: spinner enquanto o detalhe carrega. -->
<div id="modal-carregando" class="modal-carregando" aria-hidden="true"><div class="spinner-modal"></div></div>
<!-- Contentor do modal de detalhe (preenchido via HTMX ao clicar num lead) -->
<div id="modal-container"></div>
</body>
</html>
