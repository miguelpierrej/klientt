<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Ícones SVG reutilizáveis. Usar com:  <svg th:replace="~{fragments/icones :: estrela}"></svg>
  Herdam a cor do texto (fill="currentColor").
-->
<svg th:fragment="estrela" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
</svg>

<svg th:fragment="alerta" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
</svg>

<svg th:fragment="download" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
</svg>

<svg th:fragment="sucesso" class="icone-grande" viewBox="0 0 24 24" width="1.3em" height="1.3em"
     fill="currentColor" aria-hidden="true">
    <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8z"/>
</svg>

<!-- Telefone (contacto direto). -->
<svg th:fragment="telefone" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.24 1.02l-2.2 2.2z"/>
</svg>

<!-- Alvo (busca certeira por nicho). -->
<svg th:fragment="alvo" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-11a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
</svg>

<!-- Loja (empresas locais / sem presença digital). -->
<svg th:fragment="loja" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/>
</svg>

<!-- Check simples (bullets de lista). -->
<svg th:fragment="check" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
</svg>

<!-- Sócios / pessoas (decisores). -->
<svg th:fragment="socios" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
</svg>

<!-- Escudo (dados oficiais / LGPD). -->
<svg th:fragment="escudo" class="icone" viewBox="0 0 24 24" width="1em" height="1em"
     fill="currentColor" aria-hidden="true">
    <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
</svg>
</body>
</html>
