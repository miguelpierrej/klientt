<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — planos</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">Planos</p>
        </div>
        <div class="utilizador">
            <a class="btn-link" th:href="@{/}">Buscar</a>
            <a class="btn-link" th:href="@{/conta}">A minha conta</a>
        </div>
    </div>
</header>

<main class="container conta">
    <h2>Escolha o seu plano</h2>
    <p class="ajuda">Plano atual: <strong th:text="${planoAtual}">—</strong></p>

    <p class="aviso erro" th:unless="${disponivel}">
        Pagamentos ainda não estão configurados neste ambiente. Volte mais tarde.
    </p>

    <div class="planos-grelha">
        <div class="cartao-plano" th:each="p : ${planos}">
            <h3 th:text="${p.nome}">Plano</h3>
            <p class="plano-preco">R$ <span th:text="${#numbers.formatDecimal(p.preco, 1, 2)}">0,00</span><span class="plano-mes">/mês</span></p>
            <p class="plano-limite"><strong th:text="${p.limiteLeadsMes}">0</strong> leads/mês</p>
            <a class="btn" th:if="${disponivel}" th:href="@{/assinar/{n}(n=${p.nome})}">Assinar</a>
            <button class="btn" th:unless="${disponivel}" disabled>Indisponível</button>
        </div>
    </div>
</main>
</body>
</html>
