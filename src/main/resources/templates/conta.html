<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — a minha conta</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">A minha conta</p>
        </div>
        <div class="utilizador">
            <a class="btn-link" th:href="@{/app}">Buscar</a>
            <form method="post" th:action="@{/logout}">
                <button type="submit" class="btn-link">Sair</button>
            </form>
        </div>
    </div>
</header>

<main class="container conta">
    <h2>A minha conta</h2>

    <div class="cartao-conta">
        <p><span class="rotulo">Nome</span> <strong th:text="${conta.nome()}">Nome</strong></p>
        <p><span class="rotulo">Email</span> <strong th:text="${conta.email()}">email</strong></p>
    </div>

    <div class="cartao-conta">
        <h3>Créditos de leads</h3>
        <p class="consumo-numeros">
            <strong th:text="${conta.disponivel()}">0</strong> leads disponíveis
            <span class="ajuda">(de <span th:text="${conta.comprado()}">0</span> comprados)</span>
        </p>
        <div class="barra-quota" th:if="${conta.comprado() > 0}">
            <div class="barra-quota-preenchida"
                 th:classappend="${conta.percentagemUsada() >= 100} ? ' cheia'"
                 th:style="'width:' + ${conta.percentagemUsada()} + '%'"></div>
        </div>
        <p class="ajuda">A 1ª página de cada busca é grátis. Para ver mais empresas, usa créditos.</p>
        <a class="btn" th:href="@{/creditos}">Comprar leads</a>
    </div>
</main>
</body>
</html>
