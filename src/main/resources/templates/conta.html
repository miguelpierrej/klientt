<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — a minha conta</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topo">
    <div class="container barra-topo">
        <div>
            <h1 class="logo">Klientt</h1>
            <p class="tagline">A minha conta</p>
        </div>
        <div class="utilizador">
            <a class="btn-link" th:href="@{/}">Buscar</a>
            <a class="btn-link" th:href="@{/planos}">Planos</a>
            <form method="post" th:action="@{/logout}">
                <button type="submit" class="btn-link">Sair</button>
            </form>
        </div>
    </div>
</header>

<main class="container conta">
    <h2>A minha conta</h2>

    <div class="cartao-conta">
        <p><span class="rotulo">Nome</span> <strong th:text="${conta.nome()}">Nome</strong></p>
        <p><span class="rotulo">Email</span> <strong th:text="${conta.email()}">email</strong></p>
        <p><span class="rotulo">Plano</span> <strong th:text="${conta.planoNome()}">Plano</strong></p>
    </div>

    <div class="cartao-conta">
        <h3>Consumo do mês</h3>
        <p class="consumo-numeros">
            <strong th:text="${conta.consumoMes()}">0</strong>
            de <span th:text="${conta.limiteLeadsMes()}">0</span> leads
            (<span th:text="${conta.restante()}">0</span> restantes)
        </p>
        <div class="barra-quota">
            <div class="barra-quota-preenchida"
                 th:classappend="${conta.percentagemUsada() >= 100} ? ' cheia'"
                 th:style="'width:' + ${conta.percentagemUsada()} + '%'"></div>
        </div>
        <p class="ajuda" th:if="${conta.percentagemUsada() >= 100}">
            Limite atingido. Faça upgrade do plano para continuar a buscar.
        </p>
    </div>
</main>
</body>
</html>
