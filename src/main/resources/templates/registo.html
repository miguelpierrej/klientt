<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientt — criar conta</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topo">
    <div class="container">
        <h1 class="logo">Klientt</h1>
    </div>
</header>

<main class="container conta">
    <h2>Criar conta grátis</h2>
    <p class="ajuda">Comece com o plano de teste (20 leads).</p>

    <form method="post" th:action="@{/registo}" th:object="${registoRequest}" class="form-conta">
        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" th:field="*{nome}" required autofocus>
            <span class="erro-campo" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">erro</span>
        </div>
        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required>
            <span class="erro-campo" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">erro</span>
        </div>
        <div class="campo">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required>
            <span class="erro-campo" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">erro</span>
        </div>
        <button type="submit" class="btn">Criar conta</button>
    </form>

    <p class="ligacao">Já tem conta? <a th:href="@{/login}">Entrar</a></p>
</main>
</body>
</html>
